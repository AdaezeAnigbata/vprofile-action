name: "Debug Load Balancer"
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER: vprofile-eks

jobs:
  investigate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EKS cluster name and connect
        run: |
          NAME=$(aws eks list-clusters --region $AWS_REGION --query "clusters[?starts_with(@, '$EKS_CLUSTER')] | [0]" --output text)
          aws eks update-kubeconfig --region $AWS_REGION --name $NAME

      - name: Ask the NGINX Service what AWS said
        run: |
          echo "=== NGINX SERVICE STATUS ==="
          kubectl get svc -n ingress-nginx ingress-nginx-controller
          echo ""
          echo "=== AWS ERROR MESSAGES ==="
          kubectl describe svc -n ingress-nginx ingress-nginx-controller
